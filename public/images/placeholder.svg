<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  
  <!-- Card -->
  <rect x="250" y="200" width="300" height="200" rx="20" ry="20" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  
  <!-- Icon (Simple Image Icon) -->
  <g transform="translate(370, 240) scale(0.6)">
    <rect x="10" y="10" width="80" height="60" rx="5" ry="5" fill="none" stroke="#666" stroke-width="4"/>
    <circle cx="35" cy="35" r="8" fill="#666"/>
    <path d="M15,65 L35,45 L55,65" fill="#666"/>
    <path d="M50,65 L70,45 L85,60" fill="#666"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="360" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#555" text-anchor="middle" letter-spacing="1">DIAGRAM COMING SOON</text>
  <text x="400" y="385" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Physics Derivation</text>
</svg>
